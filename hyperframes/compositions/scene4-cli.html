<template id="scene4-cli-template">
  <div data-composition-id="scene4-cli" data-width="1920" data-height="1080" data-start="0" data-duration="6.5">

    <!-- Background -->
    <div class="s4-bg"></div>
    <div class="s4-glow"></div>

    <!-- Label -->
    <div class="s4-label" id="s4Label">DEVELOPER EXPERIENCE</div>

    <!-- Terminal window -->
    <div class="s4-terminal" id="s4Terminal">
      <div class="s4-term-header">
        <span class="s4-term-dot s4-dot-r"></span>
        <span class="s4-term-dot s4-dot-y"></span>
        <span class="s4-term-dot s4-dot-g"></span>
        <span class="s4-term-title">Terminal — zsh</span>
      </div>
      <div class="s4-term-body">
        <div class="s4-line" id="s4Line1">
          <span class="s4-prompt">$</span>
          <span class="s4-cmd">sigillo run -- next dev</span>
        </div>
        <div class="s4-line s4-output" id="s4Line2">
          <span class="s4-ok">✓</span> Authenticated as tommy@sigillo.dev
        </div>
        <div class="s4-line s4-output" id="s4Line3">
          <span class="s4-ok">✓</span> Fetched 12 secrets for <span class="s4-env">production</span>
        </div>
        <div class="s4-line s4-output" id="s4Line4">
          <span class="s4-ok">✓</span> Injected into process environment
        </div>
        <div class="s4-line s4-output" id="s4Line5">
          <span class="s4-dim">▸</span> Starting next dev on port 3000...
        </div>
        <div class="s4-line" id="s4Line6">
          <span class="s4-cursor">_</span>
        </div>
      </div>
    </div>

    <!-- Feature pills -->
    <div class="s4-features" id="s4Features">
      <div class="s4-pill" id="s4Pill1">
        <span class="s4-pill-icon">⚡</span>
        <span class="s4-pill-text">No .env files needed</span>
      </div>
      <div class="s4-pill" id="s4Pill2">
        <span class="s4-pill-icon">🔐</span>
        <span class="s4-pill-text">E2E encrypted</span>
      </div>
      <div class="s4-pill" id="s4Pill3">
        <span class="s4-pill-icon">☁️</span>
        <span class="s4-pill-text">Self-hosted on Cloudflare</span>
      </div>
    </div>

    <style>
      [data-composition-id="scene4-cli"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        font-family: "Inter", sans-serif;
      }

      [data-composition-id="scene4-cli"] .s4-bg {
        position: absolute;
        inset: 0;
        background: #0a0a0f;
      }

      [data-composition-id="scene4-cli"] .s4-glow {
        position: absolute;
        width: 800px;
        height: 500px;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: radial-gradient(ellipse, rgba(57, 255, 20, 0.06) 0%, transparent 70%);
      }

      [data-composition-id="scene4-cli"] .s4-label {
        position: absolute;
        top: 80px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.2em;
        color: #39FF14;
        z-index: 2;
      }

      [data-composition-id="scene4-cli"] .s4-terminal {
        position: absolute;
        top: 180px;
        left: 50%;
        transform: translateX(-50%);
        width: 1000px;
        background: #0e0e16;
        border: 1px solid #1e1e2a;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 12px 48px rgba(0, 0, 0, 0.5);
      }

      [data-composition-id="scene4-cli"] .s4-term-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 14px 18px;
        background: #14141e;
        border-bottom: 1px solid #1e1e2a;
      }

      [data-composition-id="scene4-cli"] .s4-term-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }

      [data-composition-id="scene4-cli"] .s4-dot-r { background: #C1121F; }
      [data-composition-id="scene4-cli"] .s4-dot-y { background: #e5a100; }
      [data-composition-id="scene4-cli"] .s4-dot-g { background: #39FF14; }

      [data-composition-id="scene4-cli"] .s4-term-title {
        font-size: 14px;
        font-weight: 500;
        color: #3a3a44;
        margin-left: 8px;
      }

      [data-composition-id="scene4-cli"] .s4-term-body {
        padding: 28px;
        font-family: "JetBrains Mono", "Fira Code", monospace;
        font-size: 22px;
        line-height: 2.2;
      }

      [data-composition-id="scene4-cli"] .s4-prompt {
        color: #39FF14;
        margin-right: 12px;
      }

      [data-composition-id="scene4-cli"] .s4-cmd {
        color: #e8e8ec;
        font-weight: 500;
      }

      [data-composition-id="scene4-cli"] .s4-output {
        color: #888;
      }

      [data-composition-id="scene4-cli"] .s4-ok {
        color: #39FF14;
        margin-right: 8px;
      }

      [data-composition-id="scene4-cli"] .s4-env {
        color: #39FF14;
        font-weight: 600;
      }

      [data-composition-id="scene4-cli"] .s4-dim {
        color: #3a3a44;
        margin-right: 8px;
      }

      [data-composition-id="scene4-cli"] .s4-cursor {
        color: #39FF14;
        animation: none;
      }

      /* Feature pills */
      [data-composition-id="scene4-cli"] .s4-features {
        position: absolute;
        bottom: 140px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 24px;
      }

      [data-composition-id="scene4-cli"] .s4-pill {
        background: #12121a;
        border: 1px solid #1e1e2a;
        border-radius: 100px;
        padding: 14px 28px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      [data-composition-id="scene4-cli"] .s4-pill-icon {
        font-size: 20px;
      }

      [data-composition-id="scene4-cli"] .s4-pill-text {
        font-size: 20px;
        font-weight: 500;
        color: #e8e8ec;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      var S = '[data-composition-id="scene4-cli"] ';

      /* Hide lines initially */
      gsap.set(S + "#s4Line2", { opacity: 0, x: -10 });
      gsap.set(S + "#s4Line3", { opacity: 0, x: -10 });
      gsap.set(S + "#s4Line4", { opacity: 0, x: -10 });
      gsap.set(S + "#s4Line5", { opacity: 0, x: -10 });
      gsap.set(S + "#s4Line6", { opacity: 0 });
      gsap.set(S + "#s4Pill1", { opacity: 0, y: 20 });
      gsap.set(S + "#s4Pill2", { opacity: 0, y: 20 });
      gsap.set(S + "#s4Pill3", { opacity: 0, y: 20 });

      /* Label */
      tl.from(S + "#s4Label", { opacity: 0, y: -15, duration: 0.4, ease: "power3.out" }, 0.15);

      /* Terminal slides in */
      tl.from(S + "#s4Terminal", {
        opacity: 0, y: 40, scale: 0.97,
        duration: 0.6, ease: "power3.out"
      }, 0.3);

      /* Command line types in */
      tl.from(S + "#s4Line1", { opacity: 0, duration: 0.3, ease: "power2.out" }, 0.7);

      /* Output lines appear one by one (typewriter feel) */
      tl.to(S + "#s4Line2", { opacity: 1, x: 0, duration: 0.3, ease: "power2.out" }, 1.4);
      tl.to(S + "#s4Line3", { opacity: 1, x: 0, duration: 0.3, ease: "power2.out" }, 2.0);
      tl.to(S + "#s4Line4", { opacity: 1, x: 0, duration: 0.3, ease: "power2.out" }, 2.6);
      tl.to(S + "#s4Line5", { opacity: 1, x: 0, duration: 0.3, ease: "power2.out" }, 3.2);

      /* Cursor blink (finite) */
      tl.to(S + "#s4Line6", { opacity: 1, duration: 0.1 }, 3.6);
      tl.to(S + "#s4Line6", { opacity: 0, duration: 0.3, ease: "steps(1)" }, 3.9);
      tl.to(S + "#s4Line6", { opacity: 1, duration: 0.3, ease: "steps(1)" }, 4.2);
      tl.to(S + "#s4Line6", { opacity: 0, duration: 0.3, ease: "steps(1)" }, 4.5);

      /* Pills pop in */
      tl.to(S + "#s4Pill1", { opacity: 1, y: 0, duration: 0.4, ease: "back.out(1.6)" }, 3.8);
      tl.to(S + "#s4Pill2", { opacity: 1, y: 0, duration: 0.4, ease: "back.out(1.6)" }, 4.1);
      tl.to(S + "#s4Pill3", { opacity: 1, y: 0, duration: 0.4, ease: "back.out(1.6)" }, 4.4);

      window.__timelines["scene4-cli"] = tl;
    </script>
  </div>
</template>
