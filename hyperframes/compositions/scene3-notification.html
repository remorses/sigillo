<template id="scene3-notification-template">
  <div data-composition-id="scene3-notification" data-width="1920" data-height="1080" data-start="0" data-duration="6.5">

    <!-- Background -->
    <div class="s3-bg"></div>
    <div class="s3-scanlines"></div>

    <!-- Left panel: the problem -->
    <div class="s3-panel-left" id="s3PanelLeft">
      <div class="s3-panel-label s3-danger-label">THE PROBLEM</div>
      <div class="s3-env-file" id="s3EnvFile">
        <div class="s3-env-header">
          <span class="s3-env-dot s3-dot-r"></span>
          <span class="s3-env-dot s3-dot-y"></span>
          <span class="s3-env-dot s3-dot-g"></span>
          <span class="s3-env-title">.env.local</span>
        </div>
        <div class="s3-env-body">
          <div class="s3-env-line"><span class="s3-env-key">DATABASE_URL</span><span class="s3-env-eq">=</span><span class="s3-env-val">postgres://admin:p@ss@prod.db.com:5432</span></div>
          <div class="s3-env-line"><span class="s3-env-key">STRIPE_SECRET</span><span class="s3-env-eq">=</span><span class="s3-env-val">sk_live_51abc...redacted</span></div>
          <div class="s3-env-line"><span class="s3-env-key">AUTH_SECRET</span><span class="s3-env-eq">=</span><span class="s3-env-val">super_secret_key_123</span></div>
          <div class="s3-env-line"><span class="s3-env-key">API_KEY</span><span class="s3-env-eq">=</span><span class="s3-env-val">ak_prod_8f3k2j1...</span></div>
        </div>
      </div>
      <div class="s3-warning-text" id="s3Warning">Committed to git. Shared on Slack. Sitting in plain text.</div>
    </div>

    <!-- macOS Notification (registry-inspired) -->
    <div id="s3Notification" class="s3-notif-card">
      <div class="s3-notif-icon">
        <svg viewBox="0 0 36 36" fill="none">
          <rect width="36" height="36" rx="8" fill="#C1121F"/>
          <text x="18" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#fff">!</text>
        </svg>
      </div>
      <div class="s3-notif-content">
        <div class="s3-notif-header">
          <span class="s3-notif-app">SECURITY ALERT</span>
          <span class="s3-notif-time">now</span>
        </div>
        <div class="s3-notif-title">Secret Exposed</div>
        <div class="s3-notif-body">STRIPE_SECRET was pushed to the public repository main branch.</div>
      </div>
    </div>

    <!-- Right panel: the solution -->
    <div class="s3-panel-right" id="s3PanelRight">
      <div class="s3-panel-label s3-safe-label">WITH SIGILLO</div>
      <div class="s3-safe-box" id="s3SafeBox">
        <div class="s3-safe-row">
          <span class="s3-safe-icon">🔒</span>
          <span class="s3-safe-text">AES-256-GCM encrypted at rest</span>
        </div>
        <div class="s3-safe-row">
          <span class="s3-safe-icon">🚫</span>
          <span class="s3-safe-text">No .env files on disk</span>
        </div>
        <div class="s3-safe-row">
          <span class="s3-safe-icon">👥</span>
          <span class="s3-safe-text">Team access controls per environment</span>
        </div>
        <div class="s3-safe-row">
          <span class="s3-safe-icon">📋</span>
          <span class="s3-safe-text">Full audit log of every change</span>
        </div>
      </div>
    </div>

    <style>
      [data-composition-id="scene3-notification"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        font-family: "Inter", sans-serif;
      }

      [data-composition-id="scene3-notification"] .s3-bg {
        position: absolute;
        inset: 0;
        background: #0a0a0f;
      }

      [data-composition-id="scene3-notification"] .s3-scanlines {
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(57, 255, 20, 0.01) 2px,
          rgba(57, 255, 20, 0.01) 4px
        );
        pointer-events: none;
      }

      /* Panels */
      [data-composition-id="scene3-notification"] .s3-panel-left {
        position: absolute;
        left: 100px;
        top: 180px;
        width: 780px;
      }

      [data-composition-id="scene3-notification"] .s3-panel-right {
        position: absolute;
        right: 100px;
        top: 180px;
        width: 780px;
      }

      [data-composition-id="scene3-notification"] .s3-panel-label {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.2em;
        margin-bottom: 24px;
      }

      [data-composition-id="scene3-notification"] .s3-danger-label {
        color: #C1121F;
      }

      [data-composition-id="scene3-notification"] .s3-safe-label {
        color: #39FF14;
      }

      /* .env file mock */
      [data-composition-id="scene3-notification"] .s3-env-file {
        background: #12121a;
        border: 1px solid #1e1e2a;
        border-radius: 12px;
        overflow: hidden;
      }

      [data-composition-id="scene3-notification"] .s3-env-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 16px;
        background: #18182a;
        border-bottom: 1px solid #1e1e2a;
      }

      [data-composition-id="scene3-notification"] .s3-env-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }

      [data-composition-id="scene3-notification"] .s3-dot-r { background: #C1121F; }
      [data-composition-id="scene3-notification"] .s3-dot-y { background: #e5a100; }
      [data-composition-id="scene3-notification"] .s3-dot-g { background: #39FF14; }

      [data-composition-id="scene3-notification"] .s3-env-title {
        font-size: 14px;
        font-weight: 500;
        color: #3a3a44;
        margin-left: 8px;
      }

      [data-composition-id="scene3-notification"] .s3-env-body {
        padding: 20px;
        font-family: "JetBrains Mono", "Fira Code", monospace;
        font-size: 16px;
        line-height: 2;
      }

      [data-composition-id="scene3-notification"] .s3-env-key { color: #C1121F; }
      [data-composition-id="scene3-notification"] .s3-env-eq { color: #3a3a44; }
      [data-composition-id="scene3-notification"] .s3-env-val { color: #e8e8ec; }

      [data-composition-id="scene3-notification"] .s3-warning-text {
        margin-top: 24px;
        font-size: 22px;
        font-weight: 500;
        color: #C1121F;
        line-height: 1.4;
      }

      /* Notification card */
      [data-composition-id="scene3-notification"] .s3-notif-card {
        position: absolute;
        top: 24px;
        right: 24px;
        width: 400px;
        background: rgba(20, 20, 28, 0.9);
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 0 0 0.5px rgba(193, 18, 31, 0.3);
        display: flex;
        gap: 12px;
        align-items: flex-start;
        z-index: 10;
      }

      [data-composition-id="scene3-notification"] .s3-notif-icon {
        width: 36px;
        height: 36px;
        flex-shrink: 0;
      }

      [data-composition-id="scene3-notification"] .s3-notif-content {
        flex: 1;
      }

      [data-composition-id="scene3-notification"] .s3-notif-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 2px;
      }

      [data-composition-id="scene3-notification"] .s3-notif-app {
        font-size: 12px;
        font-weight: 700;
        color: #C1121F;
        letter-spacing: 0.05em;
      }

      [data-composition-id="scene3-notification"] .s3-notif-time {
        font-size: 12px;
        color: rgba(232, 232, 236, 0.35);
      }

      [data-composition-id="scene3-notification"] .s3-notif-title {
        font-size: 16px;
        font-weight: 600;
        color: #e8e8ec;
        line-height: 1.3;
        margin-bottom: 2px;
      }

      [data-composition-id="scene3-notification"] .s3-notif-body {
        font-size: 13px;
        color: rgba(232, 232, 236, 0.6);
        line-height: 1.35;
      }

      /* Safe box */
      [data-composition-id="scene3-notification"] .s3-safe-box {
        background: #12121a;
        border: 1px solid rgba(57, 255, 20, 0.15);
        border-radius: 12px;
        padding: 28px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      [data-composition-id="scene3-notification"] .s3-safe-row {
        display: flex;
        align-items: center;
        gap: 16px;
        font-size: 22px;
        color: #e8e8ec;
        font-weight: 400;
      }

      [data-composition-id="scene3-notification"] .s3-safe-icon {
        font-size: 24px;
        width: 32px;
        text-align: center;
        flex-shrink: 0;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      var S = '[data-composition-id="scene3-notification"] ';

      /* Initial states */
      gsap.set(S + "#s3Notification", { x: 440, opacity: 0 });
      gsap.set(S + "#s3PanelRight", { opacity: 0, x: 40 });

      /* Left panel: .env file appears */
      tl.from(S + "#s3PanelLeft", { opacity: 0, x: -40, duration: 0.6, ease: "power3.out" }, 0.2);
      tl.from(S + "#s3EnvFile", { opacity: 0, y: 20, duration: 0.5, ease: "power2.out" }, 0.5);

      /* .env lines stagger in */
      tl.from(S + ".s3-env-line", {
        opacity: 0, x: -20,
        duration: 0.3, ease: "power2.out",
        stagger: 0.15
      }, 0.8);

      /* Warning text */
      tl.from(S + "#s3Warning", { opacity: 0, y: 15, duration: 0.5, ease: "power2.out" }, 1.8);

      /* Notification slides in from right */
      tl.to(S + "#s3Notification", {
        x: 0, opacity: 1,
        duration: 0.5, ease: "power3.out"
      }, 2.2);

      /* Right panel: solution reveals */
      tl.to(S + "#s3PanelRight", {
        opacity: 1, x: 0,
        duration: 0.6, ease: "power3.out"
      }, 3.2);

      /* Safe rows stagger */
      tl.from(S + ".s3-safe-row", {
        opacity: 0, y: 20,
        duration: 0.4, ease: "power2.out",
        stagger: 0.2
      }, 3.5);

      /* Notification slides out */
      tl.to(S + "#s3Notification", {
        x: 440, opacity: 0,
        duration: 0.3, ease: "power3.in"
      }, 5.5);

      window.__timelines["scene3-notification"] = tl;
    </script>
  </div>
</template>
