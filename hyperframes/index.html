<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Sigillo — Stop Leaking Secrets</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", sans-serif;
      }
      .scene {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="30"
      data-width="1920"
      data-height="1080"
    >
      <!-- Scene 1: Title Card — brand reveal (0–6s) -->
      <div
        id="scene-1"
        class="scene"
        data-composition-id="scene1-title"
        data-composition-src="compositions/scene1-title.html"
        data-start="0"
        data-duration="6"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 2: X Post — social proof tweet (6–13s) -->
      <div
        id="scene-2"
        class="scene"
        data-composition-id="scene2-xpost"
        data-composition-src="compositions/scene2-xpost.html"
        data-start="5.5"
        data-duration="7.5"
        data-track-index="2"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 3: macOS Notification — secret alert (13–19s) -->
      <div
        id="scene-3"
        class="scene"
        data-composition-id="scene3-notification"
        data-composition-src="compositions/scene3-notification.html"
        data-start="12.5"
        data-duration="6.5"
        data-track-index="3"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 4: CLI Showcase — sigillo run DX (19–25s) -->
      <div
        id="scene-4"
        class="scene"
        data-composition-id="scene4-cli"
        data-composition-src="compositions/scene4-cli.html"
        data-start="18.5"
        data-duration="6.5"
        data-track-index="4"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 5: Logo Outro — CTA (25–30s) -->
      <div
        id="scene-5"
        class="scene"
        data-composition-id="scene5-outro"
        data-composition-src="compositions/scene5-outro.html"
        data-start="24.5"
        data-duration="5.5"
        data-track-index="5"
        data-width="1920"
        data-height="1080"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      var mainTl = gsap.timeline({ paused: true });

      /* ── Blur-crossfade transitions between scenes ── */

      /* Scene 1 → Scene 2 (at ~5.5s) */
      mainTl.to("#scene-1", {
        opacity: 0, scale: 0.96, filter: "blur(8px)",
        duration: 0.5, ease: "power2.in"
      }, 5.5);

      /* Scene 2 → Scene 3 (at ~12.5s) */
      mainTl.to("#scene-2", {
        opacity: 0, scale: 0.96, filter: "blur(8px)",
        duration: 0.5, ease: "power2.in"
      }, 12.5);

      /* Scene 3 → Scene 4 (at ~18.5s) */
      mainTl.to("#scene-3", {
        opacity: 0, scale: 0.96, filter: "blur(8px)",
        duration: 0.5, ease: "power2.in"
      }, 18.5);

      /* Scene 4 → Scene 5 (at ~24.5s) */
      mainTl.to("#scene-4", {
        opacity: 0, scale: 0.96, filter: "blur(8px)",
        duration: 0.5, ease: "power2.in"
      }, 24.5);

      window.__timelines["main"] = mainTl;
    </script>
  </body>
</html>
