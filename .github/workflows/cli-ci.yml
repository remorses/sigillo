# CI for sigillo CLI: cross-compile all Zig targets from a single Linux runner,
# then publish to npm on push to main.
#
# The sigillo CLI has no native platform dependencies (no X11, no system libs),
# so Zig can cross-compile all targets from one machine.

name: sigillo CLI

on:
  push:
    branches: [main]
    paths:
      - 'cli/**'
      - '.github/workflows/cli-ci.yml'
  pull_request:
    paths:
      - 'cli/**'
      - '.github/workflows/cli-ci.yml'
  workflow_dispatch:

concurrency:
  group: sigillo-cli-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: cli
        run: pnpm install

      - name: Build all targets
        working-directory: cli
        run: pnpm tsx scripts/build.ts

      - name: Build TypeScript
        working-directory: cli
        run: pnpm build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: cli/dist/

  publish:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: cli
        run: pnpm install

      - name: Build TypeScript
        working-directory: cli
        run: pnpm build

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: cli/dist/

      - name: List dist contents
        run: ls -laR cli/dist/

      - name: Check if version is already published
        id: version-check
        working-directory: cli
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm show sigillo version 2>/dev/null || echo "0.0.0")
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "published_version=$PUBLISHED_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$PACKAGE_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version $PACKAGE_VERSION already published, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Will publish $PACKAGE_VERSION (current: $PUBLISHED_VERSION)"
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.skip == 'false'
        working-directory: cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Upload binaries to GitHub Release
        if: steps.version-check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version-check.outputs.package_version }}"
          TAG="sigillo@${VERSION}"

          # Create the release and tag if they don't exist yet
          if ! gh release view "$TAG" &>/dev/null; then
            git tag "$TAG" || true
            git push origin "$TAG" || true
            gh release create "$TAG" --title "sigillo@${VERSION}" --notes "See [CHANGELOG](https://github.com/remorses/sigillo/blob/main/cli/CHANGELOG.md)" --latest
          fi

          # Create platform tarballs (unix)
          for platform in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            tar -czf "sigillo-${TAG}-${platform}.tar.gz" -C "cli/dist/${platform}" .
          done

          # Create zips for Windows
          for platform in win32-x64 win32-arm64; do
            (cd "cli/dist/${platform}" && zip -r "../../../sigillo-${TAG}-${platform}.zip" .)
          done

          echo "Uploading release assets to ${TAG}..."
          gh release upload "$TAG" \
            "sigillo-${TAG}-darwin-arm64.tar.gz" \
            "sigillo-${TAG}-darwin-x64.tar.gz" \
            "sigillo-${TAG}-linux-x64.tar.gz" \
            "sigillo-${TAG}-linux-arm64.tar.gz" \
            "sigillo-${TAG}-win32-x64.zip" \
            "sigillo-${TAG}-win32-arm64.zip" \
            --clobber
