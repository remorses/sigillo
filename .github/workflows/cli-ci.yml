# CI for sigillo CLI: build Zig binaries per platform,
# then publish to npm on push to main.
#
# macOS arm64 + x64 are built on macos-latest (Apple Silicon).
# Zig cross-compiles x86_64-macos from ARM fine since both
# use the same macOS SDK.
#
# linux-x64 is built natively on ubuntu-latest (x64).
# linux-arm64 is built natively on ubuntu-24.04-arm (ARM64).
#
# win32-x64 is built on windows-latest.

name: sigillo CLI

on:
  push:
    branches: [main]
    paths:
      - 'cli/**'
      - '.github/workflows/cli-ci.yml'
  pull_request:
    paths:
      - 'cli/**'
      - '.github/workflows/cli-ci.yml'
  workflow_dispatch:

concurrency:
  group: sigillo-cli-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: cli
        run: pnpm install

      - name: Build native darwin-arm64
        working-directory: cli
        run: pnpm tsx scripts/build.ts darwin-arm64

      - name: Build native darwin-x64
        working-directory: cli
        run: pnpm tsx scripts/build.ts darwin-x64

      - name: Upload darwin-arm64
        uses: actions/upload-artifact@v4
        with:
          name: native-darwin-arm64
          path: cli/dist/darwin-arm64/

      - name: Upload darwin-x64
        uses: actions/upload-artifact@v4
        with:
          name: native-darwin-x64
          path: cli/dist/darwin-x64/

  build-linux-x64:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: cli
        run: pnpm install

      - name: Build native linux-x64
        working-directory: cli
        run: pnpm tsx scripts/build.ts linux-x64

      - name: Upload linux-x64
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-x64
          path: cli/dist/linux-x64/

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: cli
        run: pnpm install

      - name: Build native linux-arm64
        working-directory: cli
        run: pnpm tsx scripts/build.ts linux-arm64

      - name: Upload linux-arm64
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-arm64
          path: cli/dist/linux-arm64/

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: cli
        run: pnpm install

      - name: Build native win32-x64
        working-directory: cli
        run: pnpm tsx scripts/build.ts win32-x64

      - name: Upload win32-x64
        uses: actions/upload-artifact@v4
        with:
          name: native-win32-x64
          path: cli/dist/win32-x64/

  publish:
    needs: [build-macos, build-linux-x64, build-linux-arm64, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: cli
        run: pnpm install

      - name: Build TypeScript
        working-directory: cli
        run: pnpm build

      - name: Download darwin-arm64
        uses: actions/download-artifact@v4
        with:
          name: native-darwin-arm64
          path: cli/dist/darwin-arm64/

      - name: Download darwin-x64
        uses: actions/download-artifact@v4
        with:
          name: native-darwin-x64
          path: cli/dist/darwin-x64/

      - name: Download linux-x64
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: cli/dist/linux-x64/

      - name: Download linux-arm64
        uses: actions/download-artifact@v4
        with:
          name: native-linux-arm64
          path: cli/dist/linux-arm64/

      - name: Download win32-x64
        uses: actions/download-artifact@v4
        with:
          name: native-win32-x64
          path: cli/dist/win32-x64/

      - name: List dist contents
        run: ls -laR cli/dist/

      - name: Check if version is already published
        id: version-check
        working-directory: cli
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm show sigillo version 2>/dev/null || echo "0.0.0")
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "published_version=$PUBLISHED_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$PACKAGE_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version $PACKAGE_VERSION already published, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Will publish $PACKAGE_VERSION (current: $PUBLISHED_VERSION)"
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.skip == 'false'
        working-directory: cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Upload binaries to GitHub Release
        if: steps.version-check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version-check.outputs.package_version }}"
          TAG="v${VERSION}"

          # Check if this release tag exists, skip upload if not
          if ! gh release view "$TAG" &>/dev/null; then
            echo "No release found for ${TAG}, skipping upload"
            exit 0
          fi

          # Create platform tarballs
          for platform in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            tar -czf "sigillo-${TAG}-${platform}.tar.gz" -C "cli/dist/${platform}" .
          done

          # Create zip for Windows
          (cd cli/dist/win32-x64 && zip -r "../../../sigillo-${TAG}-win32-x64.zip" .)

          echo "Uploading release assets to ${TAG}..."
          gh release upload "$TAG" \
            "sigillo-${TAG}-darwin-arm64.tar.gz" \
            "sigillo-${TAG}-darwin-x64.tar.gz" \
            "sigillo-${TAG}-linux-x64.tar.gz" \
            "sigillo-${TAG}-linux-arm64.tar.gz" \
            "sigillo-${TAG}-win32-x64.zip" \
            --clobber
